services:
  backend:
    build: ./backend
    ports: ["8080:8080"]
    environment:
      - DATABASE_URL=sqlite:///data/admin.db
      - JWT_SECRET=${JWT_SECRET:-please-change-me}
      - FRONTEND_ORIGIN=http://localhost:5173
    volumes:
      - dbdata:/data
  frontend:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: [backend]
  mobile:
    build: ./mobile
    ports: ["5174:80"]
    depends_on: [backend]
volumes:
  dbdata:
